<template>
    <lightning-card>
        <div slot="title">
            <lightning-icon icon-name="action:approval" size="small" style="margin-right:0.5rem;"></lightning-icon>
            Bind Policy &amp; Issue Group
        </div>

        <div class="slds-p-around_medium">

            <template lwc:if={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <template lwc:if={errorMessage}>
                <div class="bind-error">
                    <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                    &nbsp;{errorMessage}
                </div>
            </template>

            <!-- SUCCESS -->
            <template lwc:if={bound}>
                <div class="bind-success">
                    <lightning-icon icon-name="action:approval" size="large" class="success-icon"></lightning-icon>
                    <h2>Policy Bound Successfully!</h2>
                    <p>Group and policy records have been created.</p>
                    <div class="bind-links">
                        <a href={groupUrl} target="_blank" class="bind-link">
                            <lightning-icon icon-name="standard:account" size="x-small"></lightning-icon>
                            &nbsp;{result.groupNumber} — View Group
                        </a>
                        <a href={policyUrl} target="_blank" class="bind-link">
                            <lightning-icon icon-name="standard:orders" size="x-small"></lightning-icon>
                            &nbsp;{result.policyName} — View Policy
                        </a>
                    </div>
                    <div class="slds-m-top_medium">
                        <lightning-button label="Done" variant="brand" onclick={handleDone}></lightning-button>
                    </div>
                </div>
            </template>

            <!-- CONFIRMATION -->
            <template lwc:if={showConfirm}>
                <div class="bind-summary">

                    <div class="bind-section-label">ACCOUNT</div>
                    <div class="bind-row">
                        <span class="bind-lbl">Group</span>
                        <span class="bind-val">{summary.accountName}</span>
                    </div>
                    <div class="bind-row">
                        <span class="bind-lbl">Segment</span>
                        <span class="bind-val">{summary.segment}</span>
                    </div>
                    <div class="bind-row">
                        <span class="bind-lbl">Group Size</span>
                        <span class="bind-val">{summary.groupSize} employees</span>
                    </div>
                    <div class="bind-row">
                        <span class="bind-lbl">Total Monthly Premium</span>
                        <span class="bind-val bind-premium">{formattedTotalPremium}</span>
                    </div>

                    <div class="bind-section-label">
                        PROPOSALS — Accept or Reject each before binding
                    </div>
                    <p class="bind-hint">
                        One group will be created for this quote.
                        Only accepted proposals generate a policy.
                    </p>

                    <template for:each={proposalRows} for:item="row">
                        <div key={row.id} class={row.rowClass}>
                            <div class="prop-info">
                                <span class="prop-name">{row.name}</span>
                                <span class="prop-plan">{row.plan}</span>
                                <span class="prop-premium">{row.formattedPremium}/mo</span>
                            </div>
                            <div class="prop-actions">
                                <template lwc:if={row.isPending}>
                                    <button class="btn-accept" data-id={row.id} onclick={handleAccept}>✓ Accept</button>
                                    <button class="btn-reject" data-id={row.id} onclick={handleReject}>✗ Reject</button>
                                </template>
                                <template lwc:if={row.isAccepted}>
                                    <span class="status-accepted">✓ Accepted</span>
                                    <button class="btn-undo" data-id={row.id} onclick={handleUndo}>Undo</button>
                                </template>
                                <template lwc:if={row.isRejected}>
                                    <span class="status-rejected">✗ Rejected</span>
                                    <button class="btn-undo" data-id={row.id} onclick={handleUndo}>Undo</button>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template lwc:if={hasPendingProposals}>
                        <p class="bind-warning">⚠ All proposals must be accepted or rejected before binding.</p>
                    </template>
                </div>

                <div class="bind-actions">
                    <lightning-button label="Cancel" variant="neutral" onclick={handleCancel}></lightning-button>
                    <lightning-button label="Bind &amp; Issue Policy" variant="brand"
                        disabled={isBindDisabled} onclick={handleBind}></lightning-button>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
